<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>汉字笔画书写</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cnchar/cnchar.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cnchar-order/cnchar.order.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #eef2f7;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 0;
        }

        /* ========== 主容器 - 卡片式 ========== */
        .app {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 32px;
            min-height: 100vh;
        }

        h1 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* ========== 输入区域 ========== */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            width: 100%;
            max-width: 400px;
        }

        .controls input {
            flex: 1;
            min-width: 0;
            height: 44px;
            text-align: center;
            font-size: 20px;
            border: 2px solid #d0d7de;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            letter-spacing: 3px;
            background: #fff;
        }

        .controls input:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
        }

        .controls .btn {
            flex-shrink: 0;
        }

        /* ========== 按钮通用 ========== */
        .btn {
            height: 44px;
            padding: 0 20px;
            font-size: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 600;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.95);
            opacity: 0.85;
        }

        .btn-primary { background: #4a90d9; color: #fff; }
        .btn-primary:hover { background: #3a7bc8; }

        .btn-stroke { background: #e8533e; color: #fff; }
        .btn-stroke:hover { background: #d4432e; }

        .btn-reset { background: #6c757d; color: #fff; }
        .btn-reset:hover { background: #5a6268; }

        .btn-animate { background: #28a745; color: #fff; }
        .btn-animate:hover { background: #218838; }

        .btn-replay { background: #f5a623; color: #fff; }
        .btn-replay:hover { background: #e09515; }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ========== 模式切换 ========== */
        .mode-tabs {
            display: flex;
            margin-bottom: 18px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #4a90d9;
            width: 100%;
            max-width: 280px;
        }

        .mode-tab {
            flex: 1;
            padding: 9px 0;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
            color: #4a90d9;
            text-align: center;
        }

        .mode-tab.active {
            background: #4a90d9;
            color: #fff;
        }

        .mode-tab:hover:not(.active) {
            background: #e8f0fb;
        }

        /* ========== 田字格区域 ========== */
        .grids-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 6px;
            width: 100%;
            padding: 12px 0;
        }

        .grid-cell {
            border: 2px solid #c0392b;
            background: #fff;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
            border-radius: 4px;
        }

        /* quiz 模式：只显示活跃格子，其余隐藏 */
        .grids-row.quiz-mode .grid-cell {
            display: none;
        }

        .grids-row.quiz-mode .grid-cell.active {
            display: block;
        }

        .grid-cell.active {
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.3);
        }

        .grid-cell.done::after {
            content: '✓';
            position: absolute;
            top: -5px;
            right: -5px;
            width: 16px;
            height: 16px;
            background: #28a745;
            color: #fff;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            line-height: 1;
        }

        .grid-cell.active.done::after {
            background: #4a90d9;
        }

        .grid-lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .grid-lines line {
            stroke: #c0392b;
            stroke-width: 0.5;
            stroke-dasharray: 4, 3;
            opacity: 0.5;
        }

        .grid-cell .writer-div {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
        }

        /* ========== 信息提示 ========== */
        .info {
            margin-top: 8px;
            font-size: 15px;
            color: #555;
            min-height: 24px;
            text-align: center;
            line-height: 1.5;
            padding: 0 12px;
        }

        .info .highlight {
            color: #e8533e;
            font-weight: bold;
            font-size: 18px;
        }

        .info .correct { color: #28a745; }
        .info .wrong { color: #e8533e; }

        /* ========== 操作按钮行 ========== */
        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 400px;
        }

        .button-row .btn {
            flex: 1;
            min-width: 0;
            max-width: 140px;
        }

        /* ========== 成绩统计 ========== */
        .score-bar {
            display: flex;
            gap: 20px;
            margin-top: 6px;
            font-size: 13px;
            color: #888;
        }

        .score-bar span { font-weight: 600; }
        .score-bar .correct-count { color: #28a745; }
        .score-bar .mistake-count { color: #e8533e; }

        /* ========== Quiz 切字标签栏 ========== */
        .quiz-char-tabs {
            display: none;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
            width: 100%;
        }

        .quiz-char-tabs.visible {
            display: flex;
        }

        .quiz-char-tab {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 2px solid #d0d7de;
            border-radius: 8px;
            cursor: pointer;
            background: #fff;
            color: #333;
            transition: all 0.15s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .quiz-char-tab:active {
            transform: scale(0.93);
        }

        .quiz-char-tab.active {
            border-color: #4a90d9;
            background: #4a90d9;
            color: #fff;
            box-shadow: 0 1px 4px rgba(74, 144, 217, 0.3);
        }

        .quiz-char-tab.done {
            border-color: #28a745;
        }

        .quiz-char-tab.done::after {
            content: '✓';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            background: #28a745;
            color: #fff;
            border-radius: 50%;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .quiz-char-tab.active.done::after {
            background: #fff;
            color: #4a90d9;
        }

        /* ========== 语音开关 ========== */
        .voice-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .voice-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #4a90d9;
            cursor: pointer;
        }

        /* ========== 响应式 ========== */

        /* 大屏 / 桌面 */
        @media (min-width: 600px) {
            .app {
                padding-top: 48px;
            }

            h1 {
                font-size: 26px;
                margin-bottom: 28px;
            }

            .controls input {
                height: 48px;
                font-size: 22px;
            }

            .btn {
                height: 48px;
                font-size: 16px;
                padding: 0 24px;
            }

            .mode-tabs {
                max-width: 320px;
            }

            .mode-tab {
                padding: 10px 0;
                font-size: 15px;
            }
        }

        /* 极小屏 (<= 360px) */
        @media (max-width: 360px) {
            .app {
                padding: 16px 10px 24px;
            }

            h1 {
                font-size: 19px;
                margin-bottom: 14px;
            }

            .controls input {
                height: 40px;
                font-size: 17px;
                letter-spacing: 2px;
            }

            .btn {
                height: 40px;
                padding: 0 14px;
                font-size: 13px;
            }

            .mode-tab {
                font-size: 12px;
                padding: 8px 0;
            }

            .grids-row {
                gap: 6px;
            }

            .quiz-char-tabs {
                gap: 6px;
            }

            .quiz-char-tab {
                width: 32px;
                height: 32px;
                font-size: 16px;
                border-radius: 6px;
            }

            .info {
                font-size: 13px;
            }

            .info .highlight {
                font-size: 16px;
            }

            .button-row {
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>汉字笔画练习</h1>

        <div class="controls">
            <input type="text" id="charInput" maxlength="10" placeholder="输入汉字，最多10个" />
            <button class="btn btn-primary" id="loadBtn" onclick="loadCharacter()">加载</button>
        </div>

        <!-- 模式切换 -->
        <div class="mode-tabs">
            <button class="mode-tab active" id="tabDemo" onclick="switchMode('demo')">📖 演示</button>
            <button class="mode-tab" id="tabQuiz" onclick="switchMode('quiz')">✍️ 自己写</button>
        </div>

        <!-- 语音开关 -->
        <label class="voice-toggle" id="voiceToggleWrap" style="display:none;">
            <input type="checkbox" id="voiceToggle" checked />
            <span>🔊 笔画语音</span>
        </label>

        <!-- 小田字格横排 -->
        <div class="grids-row" id="gridsRow"></div>

        <!-- Quiz 模式切字标签 -->
        <div class="quiz-char-tabs" id="quizCharTabs"></div>

        <div class="info" id="strokeInfo">请输入汉字并点击「加载」</div>
        <div class="score-bar" id="scoreBar" style="display:none;">
            <div>✅ 正确：<span class="correct-count" id="correctCount">0</span></div>
            <div>❌ 错误：<span class="mistake-count" id="mistakeCount">0</span></div>
        </div>

        <div class="button-row" id="demoButtons">
            <button class="btn btn-stroke" id="nextStrokeBtn" onclick="showNextStroke()" disabled>下一笔</button>
            <button class="btn btn-replay" id="replayBtn" onclick="replayStroke()" disabled>重复</button>
            <button class="btn btn-reset" id="resetBtn" onclick="resetStrokes()" disabled>重置</button>
            <button class="btn btn-animate" id="animateBtn" onclick="animateAll()" disabled>自动写</button>
        </div>

        <div class="button-row" id="quizButtons" style="display:none;">
            <button class="btn btn-reset" id="quizResetBtn" onclick="startQuiz()" disabled>重新开始</button>
        </div>
    </div>

    <script>
        let writer = null;
        let writers = [];
        let writerStrokes = [];
        let currentStroke = 0;
        let totalStrokes = 0;
        let currentMode = 'demo';
        let currentChar = '';
        let quizMistakes = 0;
        let quizCorrect = 0;

        let isAnimating = false;     // 自动书写进行中标记

        let charArray = [];
        let charIndex = 0;
        let charDone = {};
        let loadedCount = 0;

        let charStrokeNames = [];    // 每个字的笔画名称数组（来自 cnchar）
        let voiceEnabled = true;     // 语音开关

        // ========== 模式切换 ==========
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tabDemo').classList.toggle('active', mode === 'demo');
            document.getElementById('tabQuiz').classList.toggle('active', mode === 'quiz');
            document.getElementById('demoButtons').style.display = mode === 'demo' ? 'flex' : 'none';
            document.getElementById('quizButtons').style.display = mode === 'quiz' ? 'flex' : 'none';
            document.getElementById('scoreBar').style.display = mode === 'quiz' ? 'flex' : 'none';
            document.getElementById('gridsRow').classList.toggle('quiz-mode', mode === 'quiz');

            updateQuizTabs();

            if (charArray.length > 0) {
                reloadAll();
            }
        }

        // ========== 加载汉字 ==========
        function loadCharacter() {
            var input = document.getElementById('charInput').value.trim();
            if (!input) { alert('请输入汉字！'); return; }

            var chars = input.match(/[\u4e00-\u9fff]/g);
            if (!chars || chars.length === 0) { alert('请输入有效的汉字！'); return; }

            charArray = chars.slice(0, 10);
            charIndex = 0;
            charDone = {};
            loadedCount = 0;

            // 移动端加载后收起键盘
            document.getElementById('charInput').blur();

            createAllGrids();
        }

        // ========== 自适应格子尺寸 ==========
        function calcCellSize(count) {
            var vw = window.innerWidth;
            var appPad = vw <= 360 ? 20 : 32;
            var available = Math.min(vw, 600) - appPad;
            var gap = vw <= 360 ? 6 : 10;

            if (count === 1) {
                var s = Math.min(220, available * 0.6);
                return { size: Math.round(s), padding: Math.round(s * 0.07) };
            }

            // quiz 模式：只显示一个大格子，尺寸接近单字
            if (currentMode === 'quiz') {
                var qs = Math.min(240, available * 0.65);
                return { size: Math.round(qs), padding: Math.round(qs * 0.06) };
            }

            // 演示模式：多字一排
            var perRow = count;
            var idealSize = Math.floor((available - gap * (perRow - 1)) / perRow);

            if (idealSize < 70) {
                perRow = Math.max(2, Math.floor((available + gap) / (70 + gap)));
                idealSize = Math.floor((available - gap * (perRow - 1)) / perRow);
            }

            var cellSize = Math.max(60, Math.min(120, idealSize));
            return { size: cellSize, padding: Math.max(4, Math.round(cellSize * 0.05)) };
        }

        // ========== 创建所有格子 ==========
        function createAllGrids() {
            var row = document.getElementById('gridsRow');
            row.innerHTML = '';
            writers = [];
            writerStrokes = [];

            var calc = calcCellSize(charArray.length);
            var cellSize = calc.size;
            var cellPadding = calc.padding;

            for (var i = 0; i < charArray.length; i++) {
                var cell = document.createElement('div');
                cell.className = 'grid-cell' + (i === 0 ? ' active' : '');
                cell.style.width = cellSize + 'px';
                cell.style.height = cellSize + 'px';
                cell.setAttribute('data-index', i);
                cell.onclick = (function(idx) {
                    return function() { selectChar(idx); };
                })(i);

                // 田字格线
                var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('class', 'grid-lines');
                svg.setAttribute('viewBox', '0 0 100 100');
                svg.innerHTML =
                    '<line x1="50" y1="0" x2="50" y2="100"/>' +
                    '<line x1="0" y1="50" x2="100" y2="50"/>' +
                    '<line x1="0" y1="0" x2="100" y2="100"/>' +
                    '<line x1="100" y1="0" x2="0" y2="100"/>';
                cell.appendChild(svg);

                var writerDiv = document.createElement('div');
                writerDiv.className = 'writer-div';
                writerDiv.id = 'writer-' + i;
                cell.appendChild(writerDiv);

                row.appendChild(cell);
                createWriter(i, charArray[i], cellSize, cellPadding);
            }

            charIndex = 0;
            currentChar = charArray[0];
            updateActiveUI();
            renderQuizTabs();
            document.getElementById('gridsRow').classList.toggle('quiz-mode', currentMode === 'quiz');
        }

        function createWriter(index, char, size, padding) {
            var w = HanziWriter.create('writer-' + index, char, {
                width: size,
                height: size,
                padding: padding,
                showCharacter: false,
                showOutline: true,
                strokeColor: '#333',
                outlineColor: '#ddd',
                drawingColor: '#4a90d9',
                drawingWidth: size > 150 ? 6 : (size > 90 ? 4 : 3),
                strokeAnimationSpeed: 1,
                delayBetweenStrokes: 0,
                highlightColor: '#aad4ff',
                showHintAfterMisses: 3,
                highlightOnComplete: true,
                radicalColor: '#333',
                charDataLoader: function (c, onLoad) {
                    fetch('https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + c + '.json')
                        .then(function(res) {
                            if (!res.ok) throw new Error('找不到该汉字数据');
                            return res.json();
                        })
                        .then(function(data) {
                            writerStrokes[index] = data.strokes.length;
                            // 使用 cnchar 获取笔画名称
                            try {
                                var names = cnchar.stroke(charArray[index], 'order', 'name');
                                charStrokeNames[index] = (names && names[0]) ? names[0] : [];
                            } catch (e) {
                                charStrokeNames[index] = [];
                            }
                            onLoad(data);
                            loadedCount++;
                            if (loadedCount === charArray.length) onAllLoaded();
                        })
                        .catch(function() {
                            writerStrokes[index] = 0;
                            loadedCount++;
                            if (loadedCount === charArray.length) onAllLoaded();
                        });
                }
            });
            writers[index] = w;
        }

        function onAllLoaded() {
            writer = writers[charIndex];
            totalStrokes = writerStrokes[charIndex] || 0;
            currentStroke = 0;
            quizMistakes = 0;
            quizCorrect = 0;
            updateScoreBar();
            document.getElementById('voiceToggleWrap').style.display = 'flex';

            if (currentMode === 'quiz') {
                enableQuizButtons();
                startQuiz();
            } else {
                updateInfo();
                enableDemoButtons();
            }
        }

        function reloadAll() {
            cancelAdvance();
            isAnimating = false;
            loadedCount = 0;
            charDone = {};
            charIndex = 0;
            charStrokeNames = [];
            createAllGrids();
        }

        // ========== 选字 ==========
        function selectChar(idx) {
            if (idx === charIndex && !isAnimating) return;

            cancelAdvance();

            // 如果正在自动书写，先取消当前动画
            if (isAnimating) {
                isAnimating = false;
                if (writer) writer.cancelQuiz();
            }

            charIndex = idx;
            currentChar = charArray[idx];
            writer = writers[idx];
            totalStrokes = writerStrokes[idx] || 0;
            currentStroke = 0;
            quizMistakes = 0;
            quizCorrect = 0;
            updateScoreBar();
            updateActiveUI();

            // 重置当前字的 writer 显示状态
            if (writer) {
                writer.hideCharacter();
                writer.showOutline();
            }

            if (currentMode === 'quiz') {
                startQuiz();
            } else {
                updateInfo();
                enableDemoButtons();
            }
        }

        function updateActiveUI() {
            var cells = document.querySelectorAll('.grid-cell');
            for (var i = 0; i < cells.length; i++) {
                cells[i].classList.toggle('active', i === charIndex);
                cells[i].classList.toggle('done', !!charDone[i]);
            }
            updateQuizTabs();
        }

        // ========== 演示模式 ==========
        function showNextStroke() {
            if (!writer || currentStroke >= totalStrokes) return;
            cancelAdvance();
            disableDemoButtons();
            writer.animateStroke(currentStroke, {
                onComplete: function () {
                    // 语音播报当前笔画
                    if (voiceEnabled && charStrokeNames[charIndex] && charStrokeNames[charIndex][currentStroke]) {
                        speakStrokeName(charStrokeNames[charIndex][currentStroke]);
                    }
                    currentStroke++;
                    updateInfo();
                    enableDemoButtons();
                    document.getElementById('replayBtn').disabled = (currentStroke <= 0);
                    if (currentStroke >= totalStrokes) {
                        document.getElementById('nextStrokeBtn').disabled = true;
                        document.getElementById('strokeInfo').innerHTML =
                            '「' + currentChar + '」完成！共 <span class="highlight">' + totalStrokes + '</span> 笔 ✅';
                    }
                }
            });
        }

        function replayStroke() {
            if (!writer || currentStroke <= 0) return;
            disableDemoButtons();
            writer.animateStroke(currentStroke - 1, {
                onComplete: function () {
                    // 语音播报重复的笔画
                    if (voiceEnabled && charStrokeNames[charIndex] && charStrokeNames[charIndex][currentStroke - 1]) {
                        speakStrokeName(charStrokeNames[charIndex][currentStroke - 1]);
                    }
                    enableDemoButtons();
                    if (currentStroke >= totalStrokes) {
                        document.getElementById('nextStrokeBtn').disabled = true;
                    }
                }
            });
        }

        function resetStrokes() {
            if (!writer) return;
            cancelAdvance();
            isAnimating = false;
            currentStroke = 0;
            delete charDone[charIndex];
            writer.hideCharacter();
            writer.showOutline();
            updateInfo();
            updateActiveUI();
            document.getElementById('nextStrokeBtn').disabled = false;
            document.getElementById('replayBtn').disabled = true;
        }

        function animateAll() {
            if (!writer) return;

            cancelAdvance();
            isAnimating = true;
            currentStroke = 0;
            writer.hideCharacter();
            writer.showOutline();
            updateInfo();
            document.getElementById('nextStrokeBtn').disabled = true;
            document.getElementById('replayBtn').disabled = true;
            document.getElementById('animateBtn').disabled = true;
            document.getElementById('resetBtn').disabled = true;

            // 锁定当前字的信息
            var lockedWriter = writer;
            var lockedTotal = totalStrokes;
            var lockedChar = currentChar;
            var lockedIndex = charIndex;

            function animateNext(n) {
                // 动画被取消或用户切了字
                if (!isAnimating || charIndex !== lockedIndex) return;

                if (n >= lockedTotal) {
                    isAnimating = false;
                    document.getElementById('strokeInfo').innerHTML =
                        '「' + lockedChar + '」完成！共 <span class="highlight">' + lockedTotal + '</span> 笔 ✅';
                    document.getElementById('animateBtn').disabled = false;
                    document.getElementById('resetBtn').disabled = false;
                    document.getElementById('replayBtn').disabled = false;
                    document.getElementById('nextStrokeBtn').disabled = true;
                    if (charArray.length > 1) autoAdvance();
                    return;
                }
                lockedWriter.animateStroke(n, {
                    onComplete: function () {
                        if (!isAnimating || charIndex !== lockedIndex) return;
                        currentStroke = n + 1;
                        updateInfo();
                        // 语音播报当前笔画，等语音结束后再进入下一笔
                        if (voiceEnabled && charStrokeNames[lockedIndex] && charStrokeNames[lockedIndex][n]) {
                            speakStrokeName(charStrokeNames[lockedIndex][n], function () {
                                if (isAnimating && charIndex === lockedIndex) animateNext(n + 1);
                            });
                        } else {
                            animateNext(n + 1);
                        }
                    }
                });
            }
            animateNext(0);
        }

        function updateInfo() {
            document.getElementById('strokeInfo').innerHTML =
                '「' + currentChar + '」<span class="highlight">' + currentStroke + '</span> / ' + totalStrokes + ' 笔';
        }

        function enableDemoButtons() {
            document.getElementById('nextStrokeBtn').disabled = false;
            document.getElementById('replayBtn').disabled = (currentStroke <= 0);
            document.getElementById('resetBtn').disabled = false;
            document.getElementById('animateBtn').disabled = false;
        }

        function disableDemoButtons() {
            document.getElementById('nextStrokeBtn').disabled = true;
            document.getElementById('replayBtn').disabled = true;
            document.getElementById('resetBtn').disabled = true;
            document.getElementById('animateBtn').disabled = true;
        }

        // ========== 笔画语音 ==========

        // Web Speech API 语音播报
        // 获取笔画显示名称
        // cnchar 返回格式可能包含：变体数字后缀如"点2"、歧义分隔如"横撇|横钩"
        function getStrokeDisplayName(name) {
            if (!name) return '';
            var idx = name.indexOf('|');
            var s = idx >= 0 ? name.substring(0, idx) : name;
            return s.replace(/\d+$/, '');
        }

        function speakStrokeName(name, onDone) {
            if (!window.speechSynthesis) { if (onDone) onDone(); return; }
            window.speechSynthesis.cancel();
            var u = new SpeechSynthesisUtterance(getStrokeDisplayName(name));
            u.lang = 'zh-CN';
            u.rate = 0.9;
            if (onDone) {
                u.onend = onDone;
                // 兜底：防止 onend 不触发
                u.onerror = onDone;
            }
            window.speechSynthesis.speak(u);
        }

        // ========== Quiz ==========
        function startQuiz() {
            if (!writer) return;
            cancelAdvance();
            currentStroke = 0;
            quizMistakes = 0;
            quizCorrect = 0;
            delete charDone[charIndex];
            updateScoreBar();
            updateActiveUI();

            writer.hideCharacter();
            writer.showOutline();

            document.getElementById('strokeInfo').innerHTML =
                '在「' + currentChar + '」格中书写 第 <span class="highlight">1</span> / ' + totalStrokes + ' 笔';

            writer.quiz({
                onCorrectStroke: function (data) {
                    quizCorrect++;
                    currentStroke = data.strokeNum + 1;
                    updateScoreBar();

                    // 语音播报当前笔画名称
                    if (voiceEnabled && charStrokeNames[charIndex] && charStrokeNames[charIndex][data.strokeNum]) {
                        speakStrokeName(charStrokeNames[charIndex][data.strokeNum]);
                    }

                    if (currentStroke < totalStrokes) {
                        var nameLabel = '';
                        if (charStrokeNames[charIndex] && charStrokeNames[charIndex][data.strokeNum]) {
                            nameLabel = '（' + getStrokeDisplayName(charStrokeNames[charIndex][data.strokeNum]) + '）';
                        }
                        document.getElementById('strokeInfo').innerHTML =
                            '<span class="correct">✓ ' + nameLabel + '</span> 第 <span class="highlight">' +
                            (currentStroke + 1) + '</span> / ' + totalStrokes + ' 笔';
                    }
                },
                onMistake: function (data) {
                    quizMistakes++;
                    updateScoreBar();
                    var hint = data.mistakesOnStroke >= 2 ? '，再错1次显示提示' : '';
                    document.getElementById('strokeInfo').innerHTML =
                        '<span class="wrong">✗ 再试试' + hint + '</span>';
                },
                onComplete: function (data) {
                    currentStroke = totalStrokes;
                    var msg = '🎉「' + currentChar + '」完成！';
                    if (data.totalMistakes === 0) {
                        msg += ' 零失误！';
                    } else {
                        msg += ' 错了 <span class="wrong">' + data.totalMistakes + '</span> 次';
                    }
                    document.getElementById('strokeInfo').innerHTML = msg;
                    if (charArray.length > 1) autoAdvance();
                }
            });
        }

        function enableQuizButtons() {
            document.getElementById('quizResetBtn').disabled = false;
        }

        function updateScoreBar() {
            document.getElementById('correctCount').textContent = quizCorrect;
            document.getElementById('mistakeCount').textContent = quizMistakes;
        }

        // ========== 自动跳转 ==========
        var advanceTimer = null;

        function markCurrentDone() {
            charDone[charIndex] = true;
            updateActiveUI();
        }

        function cancelAdvance() {
            if (advanceTimer) {
                clearTimeout(advanceTimer);
                advanceTimer = null;
            }
        }

        function autoAdvance() {
            if (charArray.length <= 1) return;
            markCurrentDone();
            cancelAdvance();

            for (var i = 1; i <= charArray.length; i++) {
                var idx = (charIndex + i) % charArray.length;
                if (!charDone[idx]) {
                    (function(nextIdx) {
                        advanceTimer = setTimeout(function() {
                            advanceTimer = null;
                            selectChar(nextIdx);
                        }, 800);
                    })(idx);
                    return;
                }
            }
            advanceTimer = setTimeout(function() {
                advanceTimer = null;
                document.getElementById('strokeInfo').innerHTML =
                    '🎉 全部 <span class="highlight">' + charArray.length + '</span> 个字完成！';
            }, 800);
        }

        // ========== Quiz 切字标签 ==========
        function renderQuizTabs() {
            var container = document.getElementById('quizCharTabs');
            container.innerHTML = '';
            if (currentMode !== 'quiz' || charArray.length <= 1) {
                container.classList.remove('visible');
                return;
            }
            container.classList.add('visible');
            for (var i = 0; i < charArray.length; i++) {
                var tab = document.createElement('div');
                tab.className = 'quiz-char-tab' + (i === charIndex ? ' active' : '') + (charDone[i] ? ' done' : '');
                tab.textContent = charArray[i];
                tab.onclick = (function(idx) {
                    return function() { selectChar(idx); };
                })(i);
                container.appendChild(tab);
            }
        }

        function updateQuizTabs() {
            if (currentMode !== 'quiz' || charArray.length <= 1) {
                document.getElementById('quizCharTabs').classList.remove('visible');
                return;
            }
            var tabs = document.querySelectorAll('.quiz-char-tab');
            if (tabs.length === 0) {
                renderQuizTabs();
                return;
            }
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.toggle('active', i === charIndex);
                tabs[i].classList.toggle('done', !!charDone[i]);
            }
        }

        // ========== 回车加载 ==========
        document.getElementById('charInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') loadCharacter();
        });

        // ========== 语音开关 ==========
        document.getElementById('voiceToggle').addEventListener('change', function () {
            voiceEnabled = this.checked;
        });

        // ========== resize 重排 ==========
        var resizeTimer = null;
        window.addEventListener('resize', function() {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                if (charArray.length > 0) {
                    var savedDone = {};
                    for (var k in charDone) savedDone[k] = charDone[k];
                    var savedIndex = charIndex;
                    createAllGrids();
                    charDone = savedDone;
                    charIndex = savedIndex;
                    currentChar = charArray[charIndex];
                    updateActiveUI();
                }
            }, 300);
        });
    </script>
</body>
</html>
